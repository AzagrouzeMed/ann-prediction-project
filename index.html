<!DOCTYPE html>
<html>
<head>
    <title>ANN Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 30px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .bar-container {
            background: #eee;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .bar {
            color: white;
            padding: 6px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Prédiction Achat (ANN)</h1>

    <input type="number" id="age" placeholder="Age"><br>
    <input type="number" id="salary" placeholder="Salaire"><br>
    <input type="number" id="visits" placeholder="Visites"><br>

    <button onclick="predict()">Prédire</button>

    <div class="result" id="result"></div>

    <div class="bar-container">
        <div class="bar" id="bar"></div>
    </div>

</div>

<script>
function predict() {
    let age = document.getElementById("age").value;
    let salary = document.getElementById("salary").value;
    let visits = document.getElementById("visits").value;

    // Simulation ANN (simple)
    let score = (age/100 + salary/10000 + visits/20) / 3;
    let prediction = (score * 100).toFixed(2);

    let resultText = "📊 Probabilité d'achat : " + prediction + " %";

    if (prediction > 50) {
        resultText += "<br><span style='color:green;'>🟢 Client susceptible d'acheter</span>";
        document.getElementById("bar").style.background = "green";
    } else {
        resultText += "<br><span style='color:red;'>🔴 Client peu susceptible d'acheter</span>";
        document.getElementById("bar").style.background = "red";
    }

    document.getElementById("result").innerHTML = resultText;
    document.getElementById("bar").style.width = prediction + "%";
    document.getElementById("bar").innerHTML = prediction + "%";
}
</script>

</body>
</html>
